<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表單自動化系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }

    /* 登入頁 */
    .login-box {
      background: #fff; border-radius: 8px; padding: 2.5rem;
      max-width: 360px; margin: 4rem auto; box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .login-box h1 { font-size: 1.3rem; margin-bottom: 1.5rem; text-align: center; }
    .login-box input {
      width: 100%; padding: 0.6rem 0.8rem; margin-bottom: 1rem;
      border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
    }
    .login-box button {
      width: 100%; background: #4a90d9; color: #fff; border: none;
      padding: 0.7rem; border-radius: 4px; font-size: 1rem; cursor: pointer;
    }
    .login-box button:hover { background: #357abd; }
    #login-error { color: #c0392b; font-size: 0.875rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* 主頁面 */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .topbar h1 { font-size: 1.4rem; }
    .logout-btn { background: transparent; border: 1px solid #ccc; padding: 0.3rem 0.9rem; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .logout-btn:hover { background: #fee; border-color: #c0392b; color: #c0392b; }

    .upload-box {
      background: #fff; border: 2px dashed #ccc; border-radius: 8px;
      padding: 2rem; text-align: center; margin-bottom: 1.5rem;
    }
    .upload-box input[type=file] { margin: 1rem 0; display: block; width: 100%; }
    .upload-box button {
      background: #4a90d9; color: #fff; border: none;
      padding: 0.6rem 1.8rem; border-radius: 4px; font-size: 1rem; cursor: pointer;
    }
    .upload-box button:disabled { background: #aaa; cursor: default; }

    #status { margin-bottom: 1rem; font-size: 0.9rem; color: #555; min-height: 1.2em; }
    #status.error { color: #c0392b; }
    #status.ok { color: #27ae60; }

    .form-result { background: #eafaf1; border-left: 4px solid #27ae60; padding: 0.8rem 1rem; border-radius: 4px; margin-bottom: 1.5rem; display: none; }
    .form-result a { display: block; margin-top: 0.3rem; color: #2980b9; word-break: break-all; }

    .warning { background: #fff3cd; border-left: 4px solid #f39c12; padding: 0.6rem 1rem; margin-bottom: 1rem; border-radius: 2px; font-size: 0.875rem; }

    /* 歷史清單 */
    .history-section { margin-top: 2rem; }
    .history-section h2 { font-size: 1rem; margin-bottom: 0.6rem; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; background: #fff; border-radius: 6px; overflow: hidden; }
    .history-table th { background: #f0f0f0; padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; }
    .history-table td { padding: 0.5rem 0.75rem; border-top: 1px solid #eee; word-break: break-all; }
    .history-table a { color: #2980b9; text-decoration: none; }
    .history-table a:hover { text-decoration: underline; }
    .no-records { color: #999; font-size: 0.875rem; padding: 0.5rem 0; }
  </style>
</head>
<body>

<!-- 登入頁 -->
<div id="login-page">
  <div class="login-box">
    <h1>表單自動化系統</h1>
    <input type="text" id="username" placeholder="帳號" autocomplete="username">
    <input type="password" id="password" placeholder="密碼" autocomplete="current-password">
    <button onclick="doLogin()">登入</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- 主頁面 -->
<div id="main-page" style="display:none">
  <div class="container">
    <div class="topbar">
      <h1>表單自動化系統</h1>
      <button class="logout-btn" onclick="doLogout()">登出（<span id="username-display"></span>）</button>
    </div>

    <div class="upload-box">
      <form id="upload-form">
        <label for="file-input">選擇 Word 文件（.docx）</label>
        <input type="file" id="file-input" accept=".docx" required>
        <button type="submit" id="submit-btn">開始分析並建立表單</button>
      </form>
    </div>

    <div id="status"></div>
    <div class="warning" id="truncate-warning" style="display:none">⚠️ 文件內容過長，已截斷，分析結果可能不完整。</div>

    <div class="form-result" id="form-result">
      <strong>表單建立成功！</strong>
      <a id="edit-link" href="#" target="_blank">✏️ 編輯表單（Google Forms 後台）</a>
      <a id="respond-link" href="#" target="_blank">📋 填寫連結（可分享給受訪者）</a>
    </div>

    <div class="history-section">
      <h2>已建立表單</h2>
      <div id="history-container"></div>
    </div>
  </div>
</div>

<script>
  const API = "https://forest-carbon.duckdns.org/forms";

  async function apiFetch(path, opts = {}) {
    return fetch(API + path, { credentials: "include", ...opts });
  }

  async function doLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    const resp = await apiFetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const json = await resp.json();
    if (!resp.ok) { errEl.textContent = json.error; return; }
    showMain(json.username);
    loadHistory();
  }

  async function doLogout() {
    await apiFetch("/logout", { method: "POST" });
    document.getElementById("main-page").style.display = "none";
    document.getElementById("login-page").style.display = "block";
    document.getElementById("password").value = "";
  }

  function showMain(username) {
    document.getElementById("login-page").style.display = "none";
    document.getElementById("main-page").style.display = "block";
    document.getElementById("username-display").textContent = username;
  }

  async function loadHistory() {
    const resp = await apiFetch("/history");
    if (!resp.ok) return;
    const { records } = await resp.json();
    renderHistory(records);
  }

  function renderHistory(records) {
    const container = document.getElementById("history-container");
    if (!records.length) {
      container.innerHTML = '<p class="no-records">尚無記錄</p>';
      return;
    }
    container.innerHTML = `<table class="history-table">
      <thead><tr><th>檔案名稱</th><th>編輯連結</th><th>填寫連結</th><th>建立時間</th></tr></thead>
      <tbody>${records.map(r => `<tr>
        <td>${esc(r.file_name)}</td>
        <td><a href="${esc(r.edit_url)}" target="_blank">✏️ 編輯</a></td>
        <td><a href="${esc(r.respond_url)}" target="_blank">📋 填寫</a></td>
        <td>${esc(r.created_at)}</td>
      </tr>`).join("")}</tbody>
    </table>`;
  }

  document.getElementById("upload-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const file = document.getElementById("file-input").files[0];
    if (!file) return;
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    submitBtn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "正在上傳並分析（Gemini），完成後自動建立 Google 表單，請稍候…";
    document.getElementById("form-result").style.display = "none";
    document.getElementById("truncate-warning").style.display = "none";

    const data = new FormData();
    data.append("file", file);
    try {
      const resp = await apiFetch("/analyze", { method: "POST", body: data });
      const json = await resp.json();
      if (json.error) {
        statusEl.className = "error";
        statusEl.textContent = "錯誤：" + json.error;
      } else {
        if (json.form_error) {
          statusEl.className = "error";
          statusEl.textContent = `分析完成（${json.fields.length} 個欄位），但表單建立失敗：${json.form_error}`;
        } else {
          statusEl.className = "ok";
          statusEl.textContent = `完成！共識別 ${json.fields.length} 個欄位，Google 表單已建立。`;
          document.getElementById("edit-link").href = json.edit_url;
          document.getElementById("respond-link").href = json.respond_url;
          document.getElementById("form-result").style.display = "block";
          document.getElementById("truncate-warning").style.display = json.truncated ? "block" : "none";
          loadHistory();
        }
      }
    } catch (err) {
      statusEl.className = "error";
      statusEl.textContent = "連線失敗：" + err.message;
    } finally {
      submitBtn.disabled = false;
    }
  });

  // 密碼欄位 Enter 觸發登入
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  // 頁面載入時檢查 session
  (async () => {
    const resp = await apiFetch("/me").catch(() => null);
    if (resp && resp.ok) {
      const { username } = await resp.json();
      showMain(username);
      loadHistory();
    }
  })();

  function esc(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
